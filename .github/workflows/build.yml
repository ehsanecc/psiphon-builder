name: Build Psiphon

on:
  workflow_dispatch:

  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      ##################################################
      # Get latest upstream commit
      ##################################################

      - name: Get latest SHA
        id: upstream
        run: |
          SHA=$(git ls-remote https://github.com/Psiphon-Labs/psiphon-tunnel-core.git HEAD | cut -f1)

          echo "sha=$SHA" >> $GITHUB_OUTPUT

      ##################################################
      # Check release existence
      ##################################################

      - name: Check already built
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="upstream-${{ steps.upstream.outputs.sha }}"

          if gh release view "$TAG" >/dev/null 2>&1
          then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      ##################################################
      # Stop if already built
      ##################################################

      - name: Exit
        if: steps.check.outputs.exists == 'true'
        run: |
          echo "Already built"
          exit 0

      ##################################################
      # Clone source
      ##################################################

      - name: Clone source
        run: |
          git clone https://github.com/Psiphon-Labs/psiphon-tunnel-core.git src

          cd src

          git checkout ${{ steps.upstream.outputs.sha }}

      ##################################################
      # Setup Go
      ##################################################

      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod

      ##################################################
      # Build
      ##################################################

      - name: Build binaries
        run: |
      
          mkdir -p dist
      
          cd src
      
          build() {
      
            GOOS="$1"
            GOARCH="$2"
            NAME="$3"
      
            OUT="../dist/psiphon-tunnel-core-${GOOS}-${NAME}"
      
            if [ "$GOOS" = "windows" ]; then
              OUT="${OUT}.exe"
            fi
      
            echo "Building $OUT"
      
            GOOS=$GOOS \
            GOARCH=$GOARCH \
            CGO_ENABLED=0 \
            go build \
              -trimpath \
              -ldflags="-s -w" \
              -o "$OUT" \
              ./ConsoleClient
          }
      
          build linux amd64 x86_64
          build linux arm64 arm64
          build linux 386 x86
          build linux arm armv7
      
          build windows amd64 x86_64
          build windows arm64 arm64
          build windows 386 x86
      
          build darwin amd64 x86_64
          build darwin arm64 arm64

      ##################################################
      # Checksums
      ##################################################

      - name: Checksums
        run: |
          cd dist

          sha256sum * > SHA256SUMS.txt

      ##################################################
      # Release
      ##################################################

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: upstream-${{ steps.upstream.outputs.sha }}
          name: Psiphon ${{ steps.upstream.outputs.sha }}
          files: |
            dist/*
